name: Build and Deploy Chrome Extension

on: 
  push:  
    branches:
      - main
  workflow_dispatch:      #Allows manual trigger in GitHub Actions. Must be triggered manually

jobs: 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code  #download repo code onto github actions
        uses: actions/checkout@v4

      - name: Set up Node.js #install node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' #specify node version
          cache: 'npm'  #cache node_modules to speed up future runs

      - name: Install dependencies #install npm dependencies for test environment
        run: npm install

      - name: Run tests #run jest tests
        run: npm test #same way we do in terminal, we will run the command before we build and deploy


  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create zip for Chrome Web Store
        run: | 
          mkdir dist
          zip -r dist/extension.zip . -x '*.git*' 'node_modules/*' '.github/*'

      - name: Upload to Chrome Web Store
        uses: Klemensas/chrome-extension-upload-action@v1.3
        with:
          refresh-token: ${{ secrets.REFRESH_TOKEN }} 
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          app-id: ${{ secrets.EXTENSION_ID }}
          file-name: dist/extension.zip

      - name: Publish to Chrome Web Store
        run: |
          curl -X POST \
          -H "Authorization: Bearer $(curl -s -X POST -d client_id=${{ secrets.CLIENT_ID }} -d client_secret=${{ secrets.CLIENT_SECRET }} -d refresh_token=${{ secrets.REFRESH_TOKEN }} -d grant_type=refresh_token https://accounts.google.com/o/oauth2/token | jq -r '.access_token')" \
          -H "x-goog-api-version: 2" \
          -H "Content-Length: 0" \
          "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.EXTENSION_ID }}/publish"

          
      
